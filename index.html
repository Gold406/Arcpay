<!DOCTYPE html><html><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>ArcPay</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#050a14;color:#fff;font-family:monospace;min-height:100vh;max-width:480px;margin:0 auto;padding:20px 16px}.h{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(245,158,11,.2)}.la{display:flex;align-items:center;gap:8px}.li{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#000}.l1{font-size:18px;font-weight:bold;color:#f59e0b}.ls{font-size:10px;color:rgba(255,255,255,.4)}.wi{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px}.dot{width:8px;height:8px;border-radius:50%;background:#22c55e}.s{border:1px solid;border-radius:8px;padding:10px;margin-bottom:16px;font-size:13px;display:none}.s.ok{background:rgba(34,197,94,.15);border-color:#22c55e;color:#22c55e}.s.er{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444}.s.ld{background:rgba(251,191,36,.15);border-color:#fbbf24;color:#fbbf24}.bc{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(217,119,6,.05));border:1px solid rgba(245,158,11,.3);border-radius:16px;padding:20px;text-align:center;margin-bottom:20px}.bl{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:2px;margin-bottom:8px}.ba{font-size:42px;font-weight:bold;color:#f59e0b}.bs{font-size:11px;color:rgba(255,255,255,.3);margin-top:4px}.tl{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}.mc{border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;cursor:pointer;display:flex;align-items:center;margin-bottom:8px;background:rgba(255,255,255,.03)}.mc.sel{border-color:#f59e0b;background:rgba(245,158,11,.1)}.me{font-size:24px;margin-right:12px}.mn{font-size:14px;font-weight:bold}.pb{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;border:none;border-radius:12px;padding:16px;font-weight:bold;width:100%;cursor:pointer;margin-bottom:16px}.pb:disabled{opacity:.5}.tc{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:14px;display:none}.tll{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-bottom:6px}.ti{font-size:12px;color:#22c55e;margin-bottom:6px;word-break:break-all}.tlink{font-size:12px;color:#60a5fa;text-decoration:none}.ft{text-align:center;font-size:11px;color:rgba(255,255,255,.3);margin-top:32px;padding-top:16px;border-top:1px solid rgba(255,255,255,.05)}.np-display{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:16px 20px 12px;text-align:right;margin-bottom:12px}.np-amount{font-size:42px;font-weight:bold;color:#f59e0b;line-height:1;word-break:break-all}.np-unit{font-size:13px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:2px;margin-top:4px}.np-cursor{display:inline-block;width:2px;height:38px;background:#f59e0b;vertical-align:middle;margin-left:3px;animation:blink 1s step-end infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}.np-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}.np-key{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:22px;font-family:monospace;font-weight:600;padding:16px 0;text-align:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}.np-key:active{background:rgba(245,158,11,.25)}.np-back{color:#f59e0b}.np-presets{display:flex;gap:8px;margin-bottom:12px}.np-preset{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.7);font-size:13px;padding:8px 0;text-align:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}.np-preset:active{background:rgba(245,158,11,.2);border-color:#f59e0b;color:#f59e0b}</style></head><body><div class=h><div class=la><div class=li>A</div><div><div class=l1>ArcPay</div><div class=ls>Merchant Payments on Arc L1</div></div></div><div class=wi><div class=dot></div><span style=font-size:12px;color:rgba(255,255,255,.7)>0x0860...8a</span></div></div><div class=s id=s></div><div class=bc><div class=bl>USDC BALANCE</div><div class=ba id=bal>--</div><div class=bs>Arc Testnet</div></div><div class=tl>Select Merchant</div><div id=ms></div><div class=tl style=margin-top:20px>AI Payment Input</div><div style="display:flex;gap:8px;margin-bottom:16px"><input id=ai-input type=text placeholder="e.g. pay john 5 usdc" style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px;color:#fff;font-family:monospace;font-size:14px;outline:none" /><button onclick=parseAI() style="background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:10px;padding:12px 16px;color:#000;font-weight:bold;font-family:monospace;cursor:pointer">Parse</button></div><div id=ai-result style="display:none;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:10px;margin-bottom:12px;font-size:13px;color:#f59e0b"></div><div class=tl style=margin-top:20px>Amount (USDC)</div><div class=np-display><div class=np-amount id=np-val>0<span class=np-cursor></span></div><div class=np-unit>USDC</div></div><div class=np-presets><div class=np-preset onclick="npPreset('1')">1</div><div class=np-preset onclick="npPreset('5')">5</div><div class=np-preset onclick="npPreset('10')">10</div><div class=np-preset onclick="npPreset('20')">20</div></div><div class=np-grid><div class=np-key onclick="npKey('1')">1</div><div class=np-key onclick="npKey('2')">2</div><div class=np-key onclick="npKey('3')">3</div><div class=np-key onclick="npKey('4')">4</div><div class=np-key onclick="npKey('5')">5</div><div class=np-key onclick="npKey('6')">6</div><div class=np-key onclick="npKey('7')">7</div><div class=np-key onclick="npKey('8')">8</div><div class=np-key onclick="npKey('9')">9</div><div class=np-key onclick="npKey('.')">.</div><div class=np-key onclick="npKey('0')">0</div><div class="np-key np-back" onclick=npBack()>&#9003;</div></div><input type=hidden id=amt><div id=conf style="display:none;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:16px;margin-bottom:12px"><div style="font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-bottom:8px">CONFIRM PAYMENT</div><div id=conf-detail style="font-size:16px;font-weight:bold;color:#fff;margin-bottom:12px"></div><div style="display:flex;gap:8px"><button onclick=cancelPay() style="flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px;color:#fff;font-family:monospace;font-size:14px;cursor:pointer">Cancel</button><button onclick=confirmPay() style="flex:1;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:10px;padding:12px;color:#000;font-family:monospace;font-size:14px;font-weight:bold;cursor:pointer">Confirm</button></div></div><button class=pb id=pb onclick=initPay()>Pay USDC</button><div class=tc id=tc><div class=tll>LAST TRANSACTION</div><div class=ti id=tid></div><a href=https://testnet.arcscan.app target=_blank class=tlink>View on ArcScan</a></div><div style="margin-bottom:20px"><div class=tl style="margin-top:20px">Transaction History</div><div id=th style="max-height:300px;overflow-y:auto"></div></div><div class=ft>Powered by <span style=color:#f59e0b>Arc L1</span> &middot; <span style=color:#60a5fa>Circle</span></div><script>let sel=null;const A="http://localhost:8080";function sh(m,t){const e=document.getElementById("s");e.textContent=m;e.className="s "+t;if(t!=="ld")setTimeout(()=>{e.className="s"},3000)}async function lb(){try{const r=await fetch(A+"/api/balance");const d=await r.json();const u=d.tokenBalances&&d.tokenBalances.find(t=>t.token.symbol==="USDC"&&!t.token.isNative);document.getElementById("bal").textContent=u?parseFloat(u.amount).toFixed(2):"20.00"}catch(e){document.getElementById("bal").textContent="20.00"}}async function lm(){const r=await fetch(A+"/api/merchants");const ms=await r.json();const em={john:"☕",mary:"🍽️",mike:"🛒"};document.getElementById("ms").innerHTML=Object.entries(ms).map(([k,m])=>"<div class=mc id=\"m-"+k+"\" onclick=\"sm('"+k+"')\" ><div class=me>"+em[k]+"</div><div class=mn>"+m.name+"</div></div>").join("")}function sm(k){document.querySelectorAll(".mc").forEach(c=>c.classList.remove("sel"));document.getElementById("m-"+k).classList.add("sel");sel=k}function initPay(){const a=document.getElementById("amt").value;if(!sel||!a||a==="0"){sh("Select merchant and amount","er");return;}const ms={"john":"John Coffee Shop","mary":"Mary Restaurant","mike":"Mike Grocery"};document.getElementById("conf-detail").textContent="Pay "+a+" USDC to "+ms[sel];document.getElementById("conf").style.display="block";document.getElementById("pb").style.display="none"}function cancelPay(){document.getElementById("conf").style.display="none";document.getElementById("pb").style.display="block"}async function confirmPay(){document.getElementById("conf").style.display="none";await pay();window.scrollTo(0,0)}async function pay(){const a=document.getElementById("amt").value;if(!sel||!a||a==="0"){sh("Select merchant and amount","er");return}sh("Processing on Arc...","ld");document.getElementById("pb").disabled=true;try{const r=await fetch(A+"/api/pay",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({merchantKey:sel,amount:a})});const d=await r.json();document.getElementById("conf").style.display="none";document.getElementById("pb").style.display="block";if(d.id){sh("Payment sent!","ok");document.getElementById("tid").textContent=d.id;document.getElementById("tc").style.display="block";lb();const ms2={"john":"John Coffee Shop","mary":"Mary Restaurant","mike":"Mike Grocery"};saveTx(ms2[sel],a,d.id)}else sh("Error: "+JSON.stringify(d),"er")}catch(e){sh("Failed: "+e.message,"er")}document.getElementById("pb").disabled=false}let npRaw="";function npRender(){const display=npRaw===""?"0":npRaw;document.getElementById("np-val").innerHTML=display+"<span class=np-cursor></span>";document.getElementById("amt").value=npRaw===""?"0":npRaw}function npKey(k){if(k==="."){if(npRaw.includes("."))return;if(npRaw==="")npRaw="0"}if(npRaw==="0"&&k!==".")npRaw="";if(npRaw.includes(".")){const p=npRaw.split(".");if(p[1].length>=2)return}if(npRaw.replace(".","").length>=7)return;npRaw+=k;npRender()}function npBack(){npRaw=npRaw.slice(0,-1);npRender()}function npPreset(v){npRaw=v;npRender()}let txHistory=JSON.parse(localStorage.getItem("arcpay_tx")||"[]");function renderHistory(){const el=document.getElementById("th");if(txHistory.length===0){el.innerHTML="<div style=text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:20px>No transactions yet</div>";return}el.innerHTML=txHistory.slice().reverse().map(t=>"<div style=border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-bottom:8px;background:rgba(255,255,255,.02)><div style=display:flex;justify-content:space-between;margin-bottom:4px><span style=font-weight:bold;color:#fff>"+t.merchant+"</span><span style=color:#f59e0b;font-weight:bold>"+t.amount+" USDC</span></div><div style=font-size:11px;color:rgba(255,255,255,.4)>"+t.date+"</div><div style=font-size:11px;color:#22c55e;word-break:break-all;margin-top:4px>"+t.id+"</div></div>").join("")}function saveTx(merchant,amount,id){const t={merchant,amount,id,date:new Date().toLocaleString()};txHistory.push(t);localStorage.setItem("arcpay_tx",JSON.stringify(txHistory));renderHistory()}function parseAI(){
const input = document.getElementById('ai-input').value.toLowerCase();
const merchants = {john:'john', coffee:'john', mary:'mary', restaurant:'mary', mike:'mike', grocery:'mike'};
const result = document.getElementById('ai-result');
let foundMerchant = null;
let foundAmount = null;
for(const [key,val] of Object.entries(merchants)){
  if(input.includes(key)){foundMerchant=val;break}
}
const amountMatch = input.match(/\d+(\.\d+)?/);
if(amountMatch) foundAmount = amountMatch[0];
if(foundMerchant && foundAmount){
  sm(foundMerchant);
  npPreset(foundAmount);
  result.style.display='block';
  const names={john:'John Coffee Shop',mary:'Mary Restaurant',mike:'Mike Grocery'};
  result.textContent='Parsed: '+names[foundMerchant]+' — '+foundAmount+' USDC';
} else if(!foundMerchant){
  result.style.display='block';
  result.style.color='#ef4444';
  result.textContent='Could not find merchant. Try: pay john 5';
} else {
  result.style.display='block';
  result.style.color='#ef4444';
  result.textContent='Could not find amount. Try: pay john 5';
}}
window.onload=()=>{lb();lm();renderHistory()}</script></body></html>
